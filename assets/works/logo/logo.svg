<svg xmlns="http://www.w3.org/2000/svg" viewBox="260 50 280 350" width="100%" height="100%">
  <!-- Transparent Background (No rect) -->
  
  <!-- Top Fence Section -->
  <g fill="#FFFFFF">
    <!-- Picket 1 -->
    <path d="M 347,80 L 358,60 L 369,80 L 369,160 H 347 Z" />
    <!-- Picket 2 -->
    <path d="M 389,80 L 400,60 L 411,80 L 411,160 H 389 Z" />
    <!-- Picket 3 -->
    <path d="M 431,80 L 442,60 L 453,80 L 453,160 H 431 Z" />
    
    <!-- Rails -->
    <rect x="335" y="90" width="130" height="6" />
    <rect x="335" y="130" width="130" height="6" />
  </g>
  
  <!-- Dark slots inside top pickets (using page background color #0B2D4D to look transparent) -->
  <g fill="#0B2D4D">
    <rect x="355.5" y="102" width="5" height="20" rx="1" />
    <rect x="397.5" y="102" width="5" height="20" rx="1" />
    <rect x="439.5" y="102" width="5" height="20" rx="1" />
  </g>

  <!-- Centered serif brand text -->
  <text x="400" y="238" font-family="'Times New Roman', Times, Georgia, serif" font-size="28" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">KM GROUP FENCING</text>

  <!-- Bottom Fence Section (Inverted) -->
  <g fill="#FFFFFF">
    <!-- Picket 1 -->
    <path d="M 347,290 H 369 V 370 L 358,390 L 347,370 Z" />
    <!-- Picket 2 -->
    <path d="M 389,290 H 411 V 370 L 400,390 L 389,370 Z" />
    <!-- Picket 3 -->
    <path d="M 431,290 H 453 V 370 L 442,390 L 431,370 Z" />
    
    <!-- Rails -->
    <rect x="335" y="314" width="130" height="6" />
    <rect x="335" y="354" width="130" height="6" />
  </g>
  
  <!-- Dark slots inside bottom pickets (using page background color #0B2D4D to look transparent) -->
  <g fill="#0B2D4D">
    <rect x="355.5" y="328" width="5" height="20" rx="1" />
    <rect x="397.5" y="328" width="5" height="20" rx="1" />
    <rect x="439.5" y="328" width="5" height="20" rx="1" />
  </g>
</svg>
